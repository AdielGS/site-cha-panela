<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Adiel & Julia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #cde3f5; padding: 20px; color: #1a1a1a; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Estilo dos Cards de Resumo */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom: 4px solid #8ba888; text-align: center; }
        .card h3 { font-size: 0.8rem; text-transform: uppercase; color: #777; margin-bottom: 10px; letter-spacing: 1px; }
        .card p { font-size: 1.8rem; font-weight: 600; color: #1a1a1a; margin: 0; }
        .card .sub { font-size: 0.8rem; color: #8ba888; font-weight: 600; }

        /* Tabela e Lista */
        .lista-container { background: rgba(255, 255, 255, 0.9); padding: 25px; border-radius: 15px; border: 2px dashed #8ba888; }
        h2 { font-family: 'Cinzel', serif; text-align: center; color: #8ba888; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #7ea8c9; color: white; text-transform: uppercase; font-size: 0.85rem; }
        tr:hover { background-color: #f9f9f9; }
        
        .badge-pix { background: #8ba888; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-presente { background: #7ea8c9; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        
        @media (max-width: 600px) {
            th, td { padding: 10px; font-size: 0.85rem; }
            .dashboard { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Painel de Controle dos Noivos</h2>

        <div class="dashboard">
            <div class="card">
                <h3>Total Confirmados</h3>
                <p id="count-total">0</p>
                <span class="sub">Pessoas na lista</span>
            </div>
            <div class="card">
                <h3>Presentes Físicos</h3>
                <p id="count-presentes">0</p>
                <span class="sub" id="perc-lista">0% da lista</span>
            </div>
            <div class="card">
                <h3>Apoio via PIX</h3>
                <p id="count-pix">0</p>
                <span class="sub">Contribuições</span>
            </div>
            <div class="card">
                <h3>Restam</h3>
                <p id="count-restam">89</p>
                <span class="sub">Itens na cartela</span>
            </div>
        </div>

        <div class="lista-container">
            <table>
                <thead>
                    <tr>
                        <th>Convidado</th>
                        <th>Tipo</th>
                        <th>Detalhe</th>
                    </tr>
                </thead>
                <tbody id="tabela-body">
                    <tr><td colspan="3" style="text-align: center;">Carregando dados...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function carregarDashboard() {
            try {
                const response = await fetch('https://backend-cha-panela.onrender.com/api/admin/lista');
                const convidados = await response.json();
                
                const totalConfirmados = convidados.length;
                const totalPix = convidados.filter(c => c.fezPix).length;
                const totalPresentes = totalConfirmados - totalPix;
                const totalItensLista = 89;
                const restam = totalItensLista - totalPresentes;
                const percentagem = Math.round((totalPresentes / totalItensLista) * 100);

                // Atualiza os Cards
                document.getElementById('count-total').innerText = totalConfirmados;
                document.getElementById('count-presentes').innerText = totalPresentes;
                document.getElementById('count-pix').innerText = totalPix;
                document.getElementById('count-restam').innerText = restam > 0 ? restam : 0;
                document.getElementById('perc-lista').innerText = `${percentagem}% da cartela preenchida`;

                // Atualiza a Tabela
                const tbody = document.getElementById('tabela-body');
                tbody.innerHTML = '';

                if (convidados.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">Ainda não há confirmações.</td></tr>';
                    return;
                }

                // Ordena por nome
                convidados.sort((a, b) => a.nome.localeCompare(b.nome));

                convidados.forEach(c => {
                    const tr = document.createElement('tr');
                    const tipoBadge = c.fezPix 
                        ? '<span class="badge-pix">PIX</span>' 
                        : '<span class="badge-presente">PRESENTE</span>';
                    const detalhe = c.fezPix ? 'Contribuição em dinheiro' : `Número escolhido: ${c.numeroEscolhido}`;
                    
                    tr.innerHTML = `
                        <td><strong>${c.nome}</strong></td>
                        <td>${tipoBadge}</td>
                        <td>${detalhe}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error(error);
                document.getElementById('tabela-body').innerHTML = '<tr><td colspan="3" style="color: red; text-align: center;">Erro ao carregar. Verifique se o servidor está ativo.</td></tr>';
            }
        }

        carregarDashboard();
        // Atualiza automaticamente a cada 2 minutos
        setInterval(carregarDashboard, 120000);
    </script>
</body>
</html>
