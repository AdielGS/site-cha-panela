<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados - Chá de Panela</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #cde3f5; padding: 20px; text-align: center; color: #1a1a1a; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px dashed #8ba888; }
        h2 { color: #8ba888; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #7ea8c9; text-align: left; }
        th { background-color: #7ea8c9; color: white; }
        .pix { color: #8ba888; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎁 Lista de Presentes Confirmados</h2>
        <table>
            <thead>
                <tr>
                    <th>Convidado</th>
                    <th>Presente Escolhido</th>
                </tr>
            </thead>
            <tbody id="tabela-convidados">
                <tr><td colspan="2">Carregando lista...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function carregarLista() {
            try {
                // Puxa os dados direto do seu banco no Render
                const response = await fetch('https://backend-cha-panela.onrender.com/api/admin/lista');
                const convidados = await response.json();
                const tbody = document.getElementById('tabela-convidados');
                tbody.innerHTML = '';

                // Se a lista estiver vazia (como está agora que você limpou)
                if(convidados.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">Nenhum convidado confirmou ainda.</td></tr>';
                    return;
                }

                // Preenche a tabela com quem já confirmou
                convidados.forEach(c => {
                    const tr = document.createElement('tr');
                    const presente = c.fezPix ? '<span class="pix">Fez PIX 💰</span>' : `Presente Nº ${c.numeroEscolhido}`;
                    tr.innerHTML = `<td><strong>${c.nome}</strong></td><td>${presente}</td>`;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                document.getElementById('tabela-convidados').innerHTML = '<tr><td colspan="2" style="color:red; text-align:center;">Erro ao carregar a lista. O Render pode estar dormindo, aguarde 30s e recarregue.</td></tr>';
            }
        }
        carregarLista();
    </script>
</body>
</html>
