<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Panela - Adiel & Julia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-convite">
        <div class="borda-interna">
            <header>
                <h2>CHÁ DE PANELA</h2>
                <h1>ADIEL<br>&<br>JULIA</h1>
                <hr class="linha-divisoria">
                <p class="data-local">SÁBADO<br>30 DE MAIO | ÁS 18H</p>
                <hr class="linha-divisoria">
            </header>

            <main id="form-area">
                <div class="input-group">
                    <input type="text" id="nome" placeholder="Nome: Seu Nome Completo" required>
                </div>
                
                <div class="numbers-section">
                    <p class="instrucao">ESCOLHA UM NÚMERO DE PRESENTE (1 A 56)</p>
                    <div class="grid" id="numeros-grid">
                        </div>
                </div>

                <button class="btn-confirmar" onclick="enviarConfirmacao()">CONFIRMAR PRESENÇA E PRESENTE</button>
            </main>

            <section id="pix-area" class="hidden">
                <div class="pix-card">
                    <p class="instrucao">SE TODOS OS NÚMEROS ESTIVEREM ESCOLHIDOS, ENVIE UM PIX:</p>
                    <div class="chave-pix">
                        Chave: <strong>51064519814</strong>
                    </div>
                </div>
            </section>
            
            <footer>
                <p>AV. EDMILSON R. MARCELINO, 413 - MIGUEL BADRA</p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
